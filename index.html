<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>উন্নত অটো অ্যানালাইসিস AI (Single File)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- TensorFlow.js (AI Library) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; }
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* Style for the disabled button */
        .disabled-label {
            cursor: not-allowed;
            background-color: #4b5563; /* Gray-600 */
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-2xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-teal-300">
                Single-File Auto Analysis AI
            </h1>
            <p class="text-gray-400 mt-2">কোনো সার্ভার ছাড়াই, ব্রাউজারে স্বয়ংক্রিয় বিশ্লেষণ</p>
        </header>

        <main class="bg-gray-800 p-6 md:p-8 rounded-xl shadow-2xl border border-gray-700">
            <!-- Upload Section -->
            <div id="upload-section">
                <h2 id="upload-title" class="text-xl font-semibold text-center mb-4">AI মডেল প্রস্তুত করা হচ্ছে...</h2>
                <div class="border-2 border-dashed border-gray-600 rounded-lg p-8 text-center">
                    <input type="file" id="image-input" class="hidden" accept="image/png, image/jpeg" disabled>
                    <label id="upload-label" for="image-input" class="disabled-label text-white font-bold py-3 px-6 rounded-lg transition-all">
                        <span id="upload-label-text">অনুগ্রহ করে অপেক্ষা করুন...</span>
                    </label>
                </div>
            </div>

            <!-- Analysis Loading Section -->
            <div id="analysis-loading-section" class="hidden text-center py-10">
                <div class="flex justify-center items-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                </div>
                <p class="text-lg font-medium text-gray-300">ছবিটি বিশ্লেষণ করা হচ্ছে...</p>
            </div>

            <!-- Result Section -->
            <div id="result-section" class="hidden">
                <h2 class="text-2xl font-bold text-center mb-6">স্বয়ংক্রিয় বিশ্লেষণের ফলাফল</h2>
                <div class="relative bg-black p-1 rounded-lg border border-gray-700">
                    <img id="result-image" src="" alt="Uploaded Chart" class="w-full h-auto rounded-md opacity-50">
                    <canvas id="result-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="text-center mt-6">
                     <button id="reset-button" class="bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-6 rounded-lg">আবার চেষ্টা করুন</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM Elements
        const uploadSection = document.getElementById('upload-section');
        const analysisLoadingSection = document.getElementById('analysis-loading-section');
        const resultSection = document.getElementById('result-section');
        const imageInput = document.getElementById('image-input');
        const uploadLabel = document.getElementById('upload-label');
        const uploadLabelText = document.getElementById('upload-label-text');
        const uploadTitle = document.getElementById('upload-title');
        const resultImage = document.getElementById('result-image');
        const canvas = document.getElementById('result-canvas');
        const ctx = canvas.getContext('2d');
        const resetButton = document.getElementById('reset-button');

        let model = null;

        // --- Main function to initialize the application ---
        async function initialize() {
            try {
                // Load the AI model
                model = await cocoSsd.load();
                console.log("AI Model loaded successfully!");

                // Enable the upload button and update text
                uploadTitle.innerText = 'AI মডেল প্রস্তুত! আপনার চার্ট আপলোড করুন';
                uploadLabel.classList.remove('disabled-label');
                uploadLabel.classList.add('cursor-pointer', 'bg-blue-600', 'hover:bg-blue-700');
                uploadLabelText.innerText = 'ফাইল বাছাই করুন';
                imageInput.disabled = false;

            } catch (err) {
                console.error("Failed to load AI model", err);
                uploadTitle.innerText = 'একটি ত্রুটি ঘটেছে';
                uploadLabelText.innerText = 'মডেল লোড করা যায়নি। পৃষ্ঠাটি রিফ্রেশ করুন।';
                uploadLabel.classList.add('bg-red-600');
            }
        }
        
        // Start initialization when the page loads
        initialize();

        imageInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            uploadSection.classList.add('hidden');
            analysisLoadingSection.classList.remove('hidden');
            resultSection.classList.add('hidden');

            const reader = new FileReader();
            reader.onload = function(e) {
                resultImage.src = e.target.result;
                resultImage.onload = async () => {
                    await analyzeImageAndDraw(resultImage);
                };
            };
            reader.readDataURL(file);
        });

        async function analyzeImageAndDraw(img) {
            const predictions = await model.detect(img);
            console.log('Predictions: ', predictions);
            
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- কাস্টম ডেমো: স্বয়ংক্রিয় ড্রয়িং ---
            const supportY = canvas.height * 0.75;
            ctx.beginPath();
            ctx.moveTo(0, supportY);
            ctx.lineTo(canvas.width, supportY);
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 4; ctx.stroke();
            ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 24px "Hind Siliguri"';
            ctx.fillText('Support Line (Auto)', 10, supportY - 10);
            
            const sellX = canvas.width * 0.7;
            const sellY = canvas.height * 0.3;
            ctx.fillStyle = '#ef4444'; ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center'; ctx.fillText('↓ Sell', sellX, sellY);

            analysisLoadingSection.classList.add('hidden');
            resultSection.classList.remove('hidden');
        }

        function resetView() {
            uploadSection.classList.remove('hidden');
            analysisLoadingSection.classList.add('hidden');
            resultSection.classList.add('hidden');
            imageInput.value = '';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        resetButton.addEventListener('click', resetView);
    </script>
</body>
</html>
